name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 本项目无第三方依赖，但如果有，在此安装
        # pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        # 停止构建如果有语法错误或未定义变量
        flake8 jsscan.py --count --select=E9,F63,F7,F82 --show-source --statistics
        # 退出码为零，仅警告
        flake8 jsscan.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with sample data
      run: |
        mkdir -p test_js
        # 创建示例 JS 文件（包含已知敏感信息）
        echo "const apiKey='AIzaSyD-8L5kXqYzXp1A2B3C4D5E6F7G8H9I0J1K2L3M';" > test_js/sample.js
        echo "const password='admin123';" > test_js/sample2.js

        # 运行扫描（使用 --scan-only 明确仅扫描本地目录）
        python jsscan.py --scan-only -d test_js --deep-scan --extract-api -o test_output.csv

        # 检查输出文件是否存在（CSV 和 API 路径文件）
        test -f test_output.csv || { echo "CSV output missing"; exit 1; }
        test -f results/api_paths.txt || { echo "API paths output missing"; exit 1; }

        # 可选：验证 CSV 包含预期的泄露记录（基础验证）
        # 这里仅确保文件非空
        if [ ! -s test_output.csv ]; then
          echo "CSV file is empty"
          exit 1
        fi

        echo "All tests passed"