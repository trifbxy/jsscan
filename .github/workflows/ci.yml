name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.7, 3.8, 3.9, '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 本项目无第三方依赖，但如果有，在此安装
        # pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        # 停止构建如果有语法错误或未定义变量
        flake8 jsscan.py --count --select=E9,F63,F7,F82 --show-source --statistics
        # 退出码为零，仅警告
        flake8 jsscan.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with sample data
      run: |
        mkdir -p test_js
        # 创建示例 JS 文件
        echo "const apiKey='AIzaSyD-8L5kXqYzXp1A2B3C4D5E6F7G8H9I0J1K2L3M';" > test_js/sample.js
        echo "const password='admin123';" > test_js/sample2.js
        # 运行扫描
        python jsscan.py -d test_js --deep-scan --extract-api -o test_output.csv
        # 检查输出文件是否存在
        test -f test_output.csv || exit 1
        test -f api_paths.txt || exit 1
        echo "All tests passed"